<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Arcana — Memory</title>
  <meta name="theme-color" content="#0a0a0a"><meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/workspace.css">
  <link rel="stylesheet" href="/css/workspace-pages.css">
</head>
<body>
  <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menu">
    <svg width="18" height="14" viewBox="0 0 18 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M1 1h16M1 7h16M1 13h16"/></svg>
  </button>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="side-head"><img src="/arcana.png" alt="" width="22" height="22"><span>ARCANA</span></div>
      <div class="side-content">
        <div class="side-section">Overview</div>
        <a class="nav-item" href="/workspace">Dashboard</a>
        <div class="side-sep"></div>
        <div class="side-section">Workspace</div>
        <a class="nav-item" href="/workspace/sessions">Sessions</a>
        <a class="nav-item active" href="/workspace/memory">Memory</a>
        <div class="side-sep"></div>
        <div class="side-section">Configuration</div>
        <span class="nav-item disabled">API Keys</span>
        <a class="nav-item" href="/workspace/proxy">Proxy</a>
        <div class="side-sep"></div>
        <div class="side-section">Account</div>
        <a class="nav-item" href="/workspace/billing">Billing</a>
        <a class="nav-item" href="/workspace/settings">Settings</a>
      </div>
      <div class="side-footer">
        <div class="side-user">
          <div class="side-avatar" id="ws-avatar">?</div>
          <div class="side-email" id="ws-email">—</div>
        </div>
        <div class="side-id" id="ws-session-id">—</div>
        <button class="btn-signout" id="btn-signout">Sign out</button>
      </div>
    </aside>

    <main class="content">
      <div class="content-inner">
        <div class="page-head">
          <h1>Memory</h1>
          <div class="page-head-meta">
            <span id="m-count" class="page-count">—</span>
            <button type="button" class="btn-ghost" id="m-refresh">Refresh</button>
          </div>
        </div>

        <p class="page-lead">
          Cloud facts synced from your local Arcana memory (<code>arcana memory push</code>) or added here.
          Local wiki and full session transcripts stay on your machine.
        </p>

        <div class="card" style="margin-bottom:1rem">
          <div class="card-head"><h2>Add fact</h2></div>
          <div class="card-body">
            <div class="form-row">
              <div class="form-group" style="flex:0 0 220px;margin-bottom:0">
                <label for="m-key">Key</label>
                <input type="text" id="m-key" class="form-input" placeholder="user.preference.theme" autocomplete="off" maxlength="120">
              </div>
              <div class="form-group" style="flex:1;margin-bottom:0">
                <label for="m-value">Value</label>
                <input type="text" id="m-value" class="form-input" placeholder="prefers dark mode" autocomplete="off" maxlength="2000">
              </div>
              <div class="form-group" style="flex:0 0 auto;margin-bottom:0;align-self:flex-end">
                <button type="button" class="btn-primary" id="m-save">Save</button>
              </div>
            </div>
            <div class="msg" id="m-msg"></div>
          </div>
        </div>

        <div class="toolbar">
          <input type="text" id="m-search" class="search-input" placeholder="Search keys and values…" autocomplete="off">
        </div>

        <div class="skel-list" id="m-skeleton">
          <div class="skel-row"><div class="skel-line w50"></div><div class="skel-line w20"></div></div>
          <div class="skel-row"><div class="skel-line w70"></div><div class="skel-line w30"></div></div>
          <div class="skel-row"><div class="skel-line w40"></div><div class="skel-line w20"></div></div>
        </div>

        <div class="memory-list is-hidden" id="m-list"></div>
        <div class="empty-state is-hidden" id="m-empty"></div>
      </div>
    </main>
  </div>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/supabase.js"></script>
  <script src="/js/workspace.js"></script>
  <script src="/js/workspace-memory.js"></script>
</body>
</html>
