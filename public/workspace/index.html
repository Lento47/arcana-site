<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Workspace — ARCANA</title>
  <meta name="theme-color" content="#121212"><meta name="robots" content="noindex">
  <link rel="stylesheet" href="/css/workspace.css">
</head>
<body>
  <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menu">
    <svg width="18" height="14" viewBox="0 0 18 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M1 1h16M1 7h16M1 13h16"/></svg>
  </button>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="side-head"><img src="/arcana.png" alt="" width="22" height="22"><span>ARCANA</span></div>
      <nav class="side-nav">
        <div class="side-section">Tools</div>
        <a class="nav-item active" href="/workspace"><span class="ni">◆</span>Overview</a>
        <span class="nav-item dim"><span class="ni">▸</span>Sessions</span>

        <div class="side-sep"></div>
        <div class="side-section">Account</div>
        <span class="nav-item dim"><span class="ni">▸</span>API Keys</span>
        <span class="nav-item dim"><span class="ni">▸</span>Billing</span>
      </nav>
      <div class="side-footer">
        <div class="side-user">
          <div class="side-avatar" id="ws-avatar">?</div>
          <div class="side-email" id="ws-email">—</div>
        </div>
        <button class="btn-signout" id="btn-signout">Sign out</button>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main class="content">
      <div class="content-inner">
        <h1>Overview</h1>

        <div class="skel-grid" id="ws-skeleton">
          <div class="skel"><div class="skel-icon"></div><div class="skel-line s40"></div><div class="skel-line s60"></div></div>
          <div class="skel"><div class="skel-icon"></div><div class="skel-line s40"></div><div class="skel-line s60"></div></div>
          <div class="skel"><div class="skel-icon"></div><div class="skel-line s40"></div><div class="skel-line s60"></div></div>
        </div>

        <div class="stats-grid" id="ws-stats" style="display:none">
          <div class="stat">
            <div class="stat-icon accent">$</div>
            <div class="stat-label">Balance</div>
            <div class="stat-value" id="ws-balance">—</div>
            <div class="stat-sub" id="ws-balance-sub"></div>
          </div>
          <div class="stat">
            <div class="stat-icon green">◆</div>
            <div class="stat-label">Credits</div>
            <div class="stat-value" id="ws-credits">—</div>
            <div class="stat-sub">1 credit = 1¢ USD</div>
          </div>
          <div class="stat">
            <div class="stat-icon amber">↗</div>
            <div class="stat-label">Requests Today</div>
            <div class="stat-value" id="ws-usage">—</div>
            <div class="stat-sub" id="ws-usage-sub"></div>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><div class="card-title">Recent Sessions</div></div>
          <div class="empty-state">No sessions yet.<br>Start one with <code style="font-family:var(--font-mono);background:hsl(var(--bg-hover));padding:1px 6px;border-radius:3px;color:hsl(var(--fg-light))">arcana</code> in your terminal.</div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/supabase.js"></script>
  <script src="/js/workspace.js"></script>
</body>
</html>
