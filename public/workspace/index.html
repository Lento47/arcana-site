<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Workspace — ARCANA</title>
  <meta name="description" content="Arcana workspace — terminal-first AI operations.">
  <meta name="theme-color" content="#08070B">
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/css/workspace.css" media="all">
</head>
<body>
  <div class="bg-atmosphere" aria-hidden="true"></div>
  <div class="bg-grid" aria-hidden="true"></div>

  <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menu">
    <svg width="18" height="14" viewBox="0 0 18 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M1 1h16M1 7h16M1 13h16"/></svg>
  </button>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <a class="side-brand" href="/"><img src="/arcana.png" alt="" width="24" height="24"><div><span class="brand-name">ARCANA</span><span class="brand-ver">workspace</span></div></a>
      <nav class="side-nav">
        <a class="nav-item active" href="/workspace"><span class="nav-icon">◈</span>Overview</a>
        <span class="nav-item soon"><span class="nav-icon">▸</span>Sessions</span>
        <span class="nav-item soon"><span class="nav-icon">▸</span>API Keys</span>
        <span class="nav-item soon"><span class="nav-icon">▸</span>Billing</span>
        <span class="nav-item soon"><span class="nav-icon">▸</span>Settings</span>
        <div class="nav-spacer"></div>
        <a class="nav-item" href="/status"><span class="nav-icon">◉</span>System Status</a>
        <a class="nav-item" href="/docs"><span class="nav-icon">▹</span>Docs</a>
      </nav>
      <div class="side-footer">
        <div class="side-user">
          <span class="side-email" id="ws-email" title="Signed in as">—</span>
          <span class="tier-badge free" id="ws-tier-badge">free</span>
        </div>
        <button class="btn-signout" id="btn-signout">Sign out</button>
      </div>
    </aside>

    <main class="content">
      <div class="content-inner">
        <div class="welcome">
          <div class="welcome-kicker">// workspace</div>
          <h1>Good to see you.</h1>
        </div>

        <div class="err-banner" id="ws-error" style="display:none"></div>

        <div class="skeleton-pulse" id="ws-skeleton">
          <div class="sk-cards">
            <div class="sk-card"><div class="sk-line w30"></div><div class="sk-line w60"></div></div>
            <div class="sk-card"><div class="sk-line w30"></div><div class="sk-line w60"></div></div>
            <div class="sk-card"><div class="sk-line w30"></div><div class="sk-line w60"></div></div>
          </div>
        </div>

        <div class="stats-grid" id="ws-stats" style="display:none">
          <div class="stat-card" id="card-balance">
            <div class="stat-icon">$</div>
            <div class="stat-body">
              <div class="stat-label">Balance</div>
              <div class="stat-value" id="ws-balance">—</div>
              <div class="stat-sub" id="ws-balance-sub"></div>
            </div>
          </div>
          <div class="stat-card" id="card-credits">
            <div class="stat-icon">◆</div>
            <div class="stat-body">
              <div class="stat-label">Credits</div>
              <div class="stat-value" id="ws-credits">—</div>
              <div class="stat-sub">1 credit = 1¢ USD</div>
            </div>
          </div>
          <div class="stat-card" id="card-usage">
            <div class="stat-icon">↗</div>
            <div class="stat-body">
              <div class="stat-label">Today's Requests</div>
              <div class="stat-value" id="ws-usage">—</div>
              <div class="stat-sub" id="ws-usage-sub"></div>
            </div>
            <div class="usage-bar-wrap"><div class="usage-bar" id="ws-usage-bar"></div></div>
          </div>
        </div>

        <div class="actions-row">
          <a class="act-btn accent" href="/credits"><span>+</span> Buy Credits</a>
          <a class="act-btn" href="/status"><span>◉</span> System Status</a>
          <a class="act-btn" href="/changelog"><span>↗</span> Changelog</a>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/supabase.js"></script>
  <script src="/js/workspace.js"></script>
</body>
</html>
