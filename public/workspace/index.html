<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Workspace — ARCANA</title>
  <meta name="description" content="Arcana workspace — terminal-first AI operations.">
  <meta name="theme-color" content="#08070B">
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/css/workspace.css" media="all">
</head>
<body>
  <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menu">
    <svg width="18" height="14" viewBox="0 0 18 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M1 1h16M1 7h16M1 13h16"/></svg>
  </button>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <a class="side-brand" href="/"><img src="/arcana.png" alt="" width="22" height="22"> ARCANA</a>
      <nav class="side-nav">
        <a class="nav-item active" href="/workspace"><span class="icon">◆</span> Dashboard</a>
        <span class="nav-item soon"><span class="icon">▸</span> Sessions</span>
        <span class="nav-item soon"><span class="icon">▸</span> Keys</span>
        <span class="nav-item soon"><span class="icon">▸</span> Billing</span>
        <span class="nav-item soon"><span class="icon">▸</span> Settings</span>
        <div class="nav-spacer"></div>
        <a class="nav-item" href="/docs"><span class="icon">▹</span> Docs</a>
      </nav>
      <div class="side-footer">
        <button class="btn-signout" id="btn-signout">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign out
        </button>
      </div>
    </aside>

    <main class="content">
      <header class="content-header">
        <h1>Dashboard</h1>
        <div class="user-bar">
          <span class="user-email" id="ws-email">—</span>
          <span class="tier-badge free" id="ws-tier-badge">free</span>
          <span id="ws-tier" style="display:none"></span>
        </div>
      </header>

      <div class="err-banner" id="ws-error" style="display:none"></div>

      <div class="skeleton" id="ws-skeleton" style="padding:20px;border-radius:10px;background:rgba(17,16,24,.4);margin-bottom:1.25rem">
        <div class="sk-line" style="width:40%"></div>
        <div class="sk-line"></div>
        <div class="sk-line short"></div>
      </div>

      <div class="stats-grid" id="ws-stats" style="display:none">
        <div class="stat-card">
          <div class="stat-label">Balance</div>
          <div class="stat-value" id="ws-balance">—</div>
          <div class="stat-sub" id="ws-balance-sub">Loading…</div>
        </div>
        <div class="stat-card green">
          <div class="stat-label">Credits</div>
          <div class="stat-value" id="ws-credits">—</div>
          <div class="stat-sub">available</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Daily Usage</div>
          <div class="stat-value" id="ws-usage">—</div>
          <div class="stat-sub" id="ws-usage-sub">requests today</div>
        </div>
      </div>

      <div class="actions-row">
        <a class="btn accent" href="/credits">Buy Credits</a>
        <a class="btn" href="/status">System Status</a>
        <a class="btn" href="/changelog">Changelog</a>
      </div>

      <div class="placeholder" id="ws-placeholder" style="display:none">
        <strong>Coming soon.</strong><br>This feature is under development.
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/supabase.js"></script>
  <script src="/js/workspace.js"></script>
</body>
</html>
