<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Arcana</title>
  <meta name="theme-color" content="#0a0a0a"><meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/workspace.css">
  <link rel="stylesheet" href="/css/workspace-pages.css">
</head>
<body>
  <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menu">
    <svg width="18" height="14" viewBox="0 0 18 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M1 1h16M1 7h16M1 13h16"/></svg>
  </button>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="side-head"><img src="/arcana.png" alt="" width="22" height="22"><span>ARCANA</span></div>
      <div class="side-content">
        <div class="side-section">Overview</div>
        <a class="nav-item active" href="/workspace">Dashboard</a>
        <div class="side-sep"></div>
        <div class="side-section">Workspace</div>
        <a class="nav-item" href="/workspace/sessions">Sessions</a>
        <a class="nav-item" href="/workspace/memory">Memory</a>
        <div class="side-sep"></div>
        <div class="side-section">Configuration</div>
        <span class="nav-item disabled">API Keys</span>
        <a class="nav-item" href="/workspace/proxy">Proxy</a>
        <div class="side-sep"></div>
        <div class="side-section">Account</div>
        <a class="nav-item" href="/workspace/billing">Billing</a>
        <a class="nav-item" href="/workspace/settings">Settings</a>
      </div>
      <div class="side-footer">
        <div class="side-user">
          <div class="side-avatar" id="ws-avatar">?</div>
          <div class="side-email" id="ws-email">—</div>
        </div>
        <div class="side-id" id="ws-session-id">—</div>
        <button class="btn-signout" id="btn-signout">Sign out</button>
      </div>
    </aside>

    <main class="content">
      <div class="content-inner">
        <h1>Dashboard</h1>

        <div class="skel-grid" id="ws-skeleton">
          <div class="skel"><div class="skel-line w40"></div><div class="skel-line w60"></div></div>
          <div class="skel"><div class="skel-line w40"></div><div class="skel-line w60"></div></div>
          <div class="skel"><div class="skel-line w40"></div><div class="skel-line w60"></div></div>
        </div>

        <div class="stats-grid is-hidden" id="ws-stats">
          <div class="stat">
            <div class="stat-label">Balance</div>
            <div class="stat-value" id="ws-balance">—</div>
            <div class="stat-sub" id="ws-balance-sub"></div>
            <div class="bar-track"><div class="bar-fill" id="ws-balance-bar" style="width:0%"></div></div>
          </div>
          <div class="stat">
            <div class="stat-label">Credits</div>
            <div class="stat-value" id="ws-credits">—</div>
            <div class="stat-sub">1 credit = 1¢ USD</div>
            <div class="bar-track"><div class="bar-fill" id="ws-credits-bar" style="width:0%"></div></div>
          </div>
          <div class="stat">
            <div class="stat-label">Requests Today</div>
            <div class="stat-value" id="ws-usage">—</div>
            <div class="stat-sub" id="ws-usage-sub"></div>
            <div class="bar-track"><div class="bar-fill" id="ws-usage-bar" style="width:0%"></div></div>
          </div>
        </div>

        <div class="dashboard-grid">
          <div class="card">
            <div class="card-head"><h2>7-Day Cost</h2></div>
            <div class="card-body">
              <svg class="sparkline" id="ws-sparkline" viewBox="0 0 200 40" preserveAspectRatio="none"></svg>
            </div>
          </div>
          <div class="card">
            <div class="card-head"><h2>Model Usage</h2></div>
            <div class="card-body" id="ws-model-usage">
              <div class="empty-state empty-state-padded">Loading...</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-head"><h2>Recent Sessions</h2></div>
          <div class="card-body" id="ws-recent-sessions">
            <div class="empty-state">No sessions yet. Run <code class="code-badge">arcana</code> in your terminal.</div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/supabase.js"></script>
  <script src="/js/workspace.js"></script>
  <script src="/js/workspace-dashboard.js"></script>
</body>
</html>
